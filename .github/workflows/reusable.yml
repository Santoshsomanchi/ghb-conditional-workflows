name : Reusable Workflow Demo
on:
  workflow_call:
    inputs:
      artifact-name:
        required: false
        default: dist
        type: string
  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Get code
          uses: actions/download-artifact@v4
            with:
              name: ${{ inputs.artifact-name }}
        - name: list files
          run: ls -al
        - name: deploy
          run: echo "Deploying the build artifacts"
         